name: Build Android App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle (.aab)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Compile Web Application
        run: npm run build

      - name: Configure and Sync Capacitor
        run: |
          # Safe check to initialize capacitor platforms if they don't exist
          if [ ! -d "android" ]; then
            echo "Android folder not detected. Adding Android platform..."
            npx cap add android
          else
            echo "Android folder detected. Syncing with web build..."
          fi
          npx cap sync

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Compile Release App Bundle (.aab)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Android App Bundle (.aab) Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FasoActu-Android-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7
