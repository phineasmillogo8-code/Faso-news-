name: Générer APK Faso News

on:
  workflow_dispatch: # Permet de lancer le build manuellement d'un clic

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurer Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer les dépendances
        run: npm install --legacy-peer-deps

      - name: Build du projet web
        run: npm run build --if-present

      - name: Synchroniser Capacitor
        run: |
          npx cap init "Faso News" com.fasonews.app --web-dir=dist || true
          npx cap add android || true
          npx cap sync

      - name: Compiler l'APK de Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          

      - name: Sauvegarder l'APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: application-faso-news-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
      
